---
# =============================================================================
# INSTALLER ROLE - Universal package and custom software installer
# =============================================================================
# This role handles two types of installations:
# 1. STANDARD: Repository-based packages (dnf)
# 2. CUSTOM: Binary/script installations with post-run hooks
# =============================================================================

# 1. ROUTING
- name: "Installer | Standard packages installation"
  include_tasks: standard.yml
  when: install_packages is defined and install_packages | length > 0

- name: "Installer | Custom installation with post-run"
  include_tasks: custom.yml
  when: install_custom is defined and install_custom | length > 0
