---
# =============================================================================
# INSTALLER ROLE - Universal package and custom software installer
# =============================================================================
# This role handles two types of installations:
# 1. STANDARD: Repository-based packages (dnf)
# 2. CUSTOM: Binary/script installations with installer scripts
# =============================================================================

# 1. ROUTING
- name: "Installer | Standard packages installation"
  include_tasks: standard.yml
  when: 
    - (install_packages_global is defined and install_packages_global | length > 0) or 
      (install_packages_host is defined and install_packages_host | length > 0)

- name: "Installer | Custom installation with installer scripts"
  include_tasks: custom.yml
  when: 
    - (install_custom_global is defined and install_custom_global | length > 0) or 
      (install_custom_host is defined and install_custom_host | length > 0)
