---
# =============================================================================
# INSTALLER STANDARD - Repository-based package installation
# =============================================================================
# Installs packages from YUM/DNF repositories and manages systemd services
# =============================================================================

# 1. REPOSITORIES (Add external YUM/DNF repositories)
- name: "Installer Standard | Add repositories"
  become: true
  get_url:
    url: "{{ item.repo }}"
    dest: "/etc/yum.repos.d/{{ item.name }}.repo"
    mode: '0644'
  loop: "{{ install_packages }}"
  loop_control:
    label: "Repo: {{ item.name }}"
  when: item.repo is defined and item.repo | length > 0

# 2. PACKAGES (Install packages via DNF)
- name: "Installer Standard | Install packages"
  become: true
  dnf:
    name: "{{ item.pkg }}"
    state: present
  loop: "{{ install_packages }}"
  loop_control:
    label: "Pkg: {{ item.name }}"
  when: item.pkg is defined and item.pkg | length > 0

# 3. SERVICES (Start and enable systemd services)
- name: "Installer Standard | Start and enable services"
  become: true
  systemd:
    name: "{{ service_item.1 }}"
    state: started
    enabled: yes
  loop: "{{ install_packages | subelements('service', skip_missing=True) }}"
  loop_control:
    loop_var: service_item
    label: "Service: {{ service_item.1 }}"
