---
- name: Check if compose templates and data dirs exist locally
  delegate_to: localhost
  become: false
  stat:
    path: "{{ playbook_dir }}/templates/{{ item.0.name }}{{ item.1 }}"
  register: file_checks
  loop: "{{ docker_compose | default([]) | product(['.yml.j2', '.data']) | list }}"
  loop_control:
    label: "Checking {{ item.0.name }}{{ item.1 }}"

- name: Create base docker directory
  file:
    path: "/opt/docker"
    state: directory
    mode: '0755'

- name: Sync data directories to host
  copy:
    src: "{{ item.stat.path }}/"
    dest: "/opt/docker/{{ item.item.0.name }}/"
  loop: "{{ file_checks.results | default([]) }}"
  loop_control:
    label: "Syncing {{ item.item.0.name }} data"
  when: 
    - item.item.1 == '.data'
    - item.stat.exists
    - item.item.0.state | default('present') == 'present'

- name: Manage Docker Compose applications
  community.docker.docker_compose_v2:
    project_name: "{{ item.item.0.name }}"
    definition: "{{ lookup('template', item.stat.path) | from_yaml if (item.item.1 == '.yml.j2' and item.stat.exists) else {} }}"
    state: "{{ item.item.0.state | default('present') }}"
    remove_orphans: yes
  loop: "{{ file_checks.results | default([]) }}"
  loop_control:
    label: "Compose: {{ item.item.0.name }} ({{ item.item.0.state | default('present') }})"
  when: 
    - item.item.1 == '.yml.j2'
    - (item.stat.exists) or (item.item.0.state | default('present') == 'absent')

- name: Remove data directories on cleanup
  file:
    path: "/opt/docker/{{ item.item.0.name }}/"
    state: absent
  loop: "{{ file_checks.results | default([]) }}"
  loop_control:
    label: "Cleaning up {{ item.item.0.name }} data"
  when:
    - item.item.1 == '.data'
    - item.item.0.state | default('present') == 'absent'