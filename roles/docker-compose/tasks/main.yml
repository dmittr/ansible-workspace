---
# =============================================================================
# DOCKER-COMPOSE ROLE - Container orchestration deployment
# =============================================================================
# Deploys Docker Compose applications with support for template overrides
# =============================================================================

# 0. FIND RESOURCES (Locate templates and data files with override support)
- name: "Docker | Find docker-compose templates"
  set_fact:
    compose_template_map: "{{ compose_template_map | default({}) | combine({item.name: lookup('first_found', search_files, errors='ignore') | default('') }) }}"
  vars:
    search_files:
      - "{{ override_path | default(playbook_dir + '/override') }}/{{ ansible_role_name }}/templates/{{ item.name }}.j2"
      - "{{ playbook_dir }}/{{ ansible_role_name }}/templates/{{ item.name }}.j2"
  loop: "{{ docker_services }}"
  loop_control:
    label: "Template: {{ item.name }}"
  ignore_errors: true

- name: "Docker | Find data files directories"
  set_fact:
    compose_data_map: "{{ compose_data_map | default({}) | combine({item.name: data_path}) }}"
  vars:
    override_data_path: "{{ override_path | default(playbook_dir + '/override') }}/{{ ansible_role_name }}/files/{{ item.name }}"
    default_data_path: "{{ playbook_dir }}/{{ ansible_role_name }}/files/{{ item.name }}"
    data_path: "{{ override_data_path if lookup('fileglob', override_data_path + '/*', errors='ignore') | length > 0 else default_data_path }}"
  loop: "{{ docker_services }}"
  loop_control:
    label: "Data dir: {{ item.name }}"
  ignore_errors: true

# 1. PREPARE DIR
- name: "Docker | Create service root directory"
  ansible.builtin.file:
    path: "{{ docker_base_path }}/{{ item.name }}"
    state: directory
    mode: '0755'
  loop: "{{ docker_services }}"
  loop_control:
    label: "Dir: {{ item.name }}"

# 2. DATA SYNC
- name: "Docker | Sync service data files"
  ansible.builtin.copy:
    src: "{{ compose_data_map[item.name] }}/"
    dest: "{{ docker_base_path }}/{{ item.name }}/data/"
    mode: '0644'
    force: yes 
  loop: "{{ docker_services }}"
  loop_control:
    label: "Data sync for: {{ item.name }}"
  when: 
    - item.has_data | default(false)
    - compose_data_map is defined
    - compose_data_map[item.name] is defined
    - compose_data_map[item.name] | length > 0
  register: container_change

# 3. RENDERING DOCKER-COMPOSE.YML
- name: "Docker | Generate docker-compose.yml"
  ansible.builtin.template:
    src: "{{ compose_template_map[item.name] }}"
    dest: "{{ docker_base_path }}/{{ item.name }}/docker-compose.yml"
    mode: '0640'
  loop: "{{ docker_services }}"
  loop_control:
    label: "Template: {{ item.name }}"
  when:
    - compose_template_map is defined
    - compose_template_map[item.name] is defined
    - compose_template_map[item.name] | length > 0
  register: compose_files

# 4. PRE-START COMMAND EXEC
- name: "Docker | Run pre-start commands"
  ansible.builtin.shell:
    cmd: "{{ item.pre_start_command }}"
  become: yes
  loop: "{{ docker_services }}"
  loop_control:
    label: "Pre-start: {{ item.name }}"
  when: 
    - item.pre_start_command is defined
    - item.state | default('present') == 'present'
  changed_when: true 

# 4.1 RESTART CHANGED
- name: "Docker | Restart changed services"
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ item }}"
    state: restarted
  loop: "{{ container_change.results | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list }}"
  when: container_change.changed

# 5. RUN CONTAINERS
- name: "Docker | Deploy services with Docker Compose"
  community.docker.docker_compose_v2:
    project_src: "{{ docker_base_path }}/{{ item.name }}"
    state: "{{ 'present' if item.state | default('present') == 'present' else 'absent' }}"
    pull: always
    recreate: auto
  loop: "{{ docker_services }}"
  loop_control:
    label: "Compose UP: {{ item.name }}"

# 6. HEALTHCHECK DOCKER NATIVE
- name: "Docker | Wait for Container Health (Docker status)"
  community.docker.docker_container_info:
    name: "{{ item.name }}"
  register: container_info
  until: >
    container_info.container['State']['Health']['Status'] == 'healthy' or 
    container_info.container['State']['Status'] == 'running'
  retries: "{{ item.healthcheck.retries | default(12) }}"
  delay: "{{ item.healthcheck.delay | default(5) }}"
  loop: "{{ docker_services }}"
  loop_control:
    label: "Waiting for Docker Health: {{ item.name }} (Type: {{ (item.healthcheck | default({})).type | default('N/A') }})"
  when: 
    - item.state | default('present') == 'present'
    - item.healthcheck is defined
    - item.healthcheck.type == 'docker'

# 7. HEALTHCHECK HTTP/Web
- name: "Docker | Wait for HTTP Service Readiness"
  ansible.builtin.uri:
    url: "http://localhost:{{ item.healthcheck.port }}{{ item.healthcheck.path | default('/') }}"
    status_code: "{{ item.healthcheck.status_code | default(200) }}"
  register: http_result
  until: http_result.status == item.healthcheck.status_code | default(200)
  retries: "{{ item.healthcheck.retries | default(12) }}"
  delay: "{{ item.healthcheck.delay | default(5) }}"
  loop: "{{ docker_services }}"
  loop_control:
    label: "Healthcheck for: {{ item.name }} [{{ (item.healthcheck | default({})).type | default('none') }}]"
  when: 
    - item.state | default('present') == 'present'
    - item.healthcheck is defined
    - item.healthcheck.type == 'http'
