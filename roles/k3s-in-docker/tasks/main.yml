---
- name: k3s_wipe condition
  block:
    - name: Remove k3s containers
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
      loop:
        - k3s-server
        - k3s-agent

    - name: Unmount k3s filesystems
      shell: |
        if mount | grep -q "/var/lib/rancher/k3s"; then
          umount -l /var/lib/rancher/k3s/storage
          umount -l $(mount | grep "/var/lib/rancher/k3s" | awk '{print $3}')
        fi
      failed_when: false
      args:
        executable: /bin/bash

    - name: Delete k3s directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/rancher/k3s
        - /var/lib/rancher/k3s
  
  when: k3s_wipe | default(false) | bool

- name: Pull k3s docker image
  community.docker.docker_image:
    name: "rancher/k3s:{{ k3s_version }}"
    source: pull

- name: Create k3s config and data directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/rancher/k3s
    - /var/lib/rancher/k3s

- name: Build node taint arguments
  set_fact:
    _k3s_node_taint: "{{ '--node-taint=node-role.kubernetes.io/master:NoSchedule' if k3s_node_type == 'master' else '' }}"

- name: Start Primary Master
  community.docker.docker_container:
    name: k3s-server
    image: "rancher/k3s:{{ k3s_version }}"
    privileged: true
    network_mode: host
    restart_policy: always
    volumes:
      - /var/lib/rancher/k3s:/var/lib/rancher/k3s
      - /lib/modules:/lib/modules:ro
      - /run:/run
    env:
      K3S_TOKEN: "{{ k3s_token }}"
      K3S_KUBECONFIG_MODE: "644"
    command: >
      server 
      --cluster-init
      --node-name={{ inventory_hostname }}
      --node-ip={{ k3s_node_ip }}
      --flannel-iface={{ k3s_flannel_interface }}
      --bind-address={{ k3s_node_ip }}
      --advertise-address={{ k3s_node_ip }}
      --tls-san={{ k3s_primary_master_ip }},{{ k3s_san }}
      {{ _k3s_node_taint }}
      {{ k3s_extra_args }}
  when: inventory_hostname == k3s_primary_master_name

- name: Wait for Primary Master API to be ready
  wait_for:
    host: "{{ k3s_primary_master_ip }}"
    port: 6443
    delay: 5
    timeout: 60
  when: inventory_hostname == k3s_primary_master_name

- name: Start Secondary Masters (HA)
  community.docker.docker_container:
    name: k3s-server
    image: "rancher/k3s:{{ k3s_version }}"
    privileged: true
    network_mode: host
    restart_policy: always
    volumes:
      - /var/lib/rancher/k3s:/var/lib/rancher/k3s
      - /lib/modules:/lib/modules:ro
      - /run:/run
    env:
      K3S_TOKEN: "{{ k3s_token }}"
    command: >
      server 
      --node-name={{ inventory_hostname }}
      --server https://{{ k3s_primary_master_ip }}:6443
      --node-ip={{ k3s_node_ip }}
      --flannel-iface={{ k3s_flannel_interface }}
      {{ _k3s_node_taint }}
      {{ k3s_extra_args }}
  when: 
    - inventory_hostname != k3s_primary_master_name
    - k3s_node_type in ['master', 'mixed']

- name: Start Worker Nodes
  community.docker.docker_container:
    name: k3s-agent
    image: "rancher/k3s:{{ k3s_version }}"
    privileged: true
    network_mode: host
    restart_policy: always
    volumes:
      - /var/lib/rancher/k3s:/var/lib/rancher/k3s
      - /lib/modules:/lib/modules:ro
      - /run:/run
    env:
      K3S_URL: "https://{{ k3s_primary_master_ip }}:6443"
      K3S_TOKEN: "{{ k3s_token }}"
    command: >
      agent
      --node-name={{ inventory_hostname }}
      --node-ip={{ k3s_node_ip }}
      --flannel-iface={{ k3s_flannel_interface }}
  when: k3s_node_type == 'worker'