---
# =============================================================================
# INIT-USER-SSH ROLE - Initial server setup and hardening
# =============================================================================
# This role performs initial server configuration:
# - Creates admin user with SSH access
# - Configures SSH security (custom port, no password auth, no root)
# - Sets up firewalld for SSH access
# - Copies root's SSH keys to new user
# =============================================================================

# 1. USER CREATION
- name: "Init-User-SSH | Add user {{ hostvars[inventory_hostname]['ansible_user'] }}"
  become: yes
  ansible.builtin.user:
    name: "{{ hostvars[inventory_hostname]['ansible_user'] }}"
    shell: /bin/bash
    groups: wheel
    append: yes
  register: user_changed

- name: "Init-User-SSH | Set user password separately"
  become: yes
  ansible.builtin.user:
    name: "{{ hostvars[inventory_hostname]['ansible_user'] }}"
    password: "{{ shared_password | password_hash('sha512') }}"
  when: user_changed.changed

# 2. SSH KEYS (Copy root's authorized_keys to new user)
- name: "Init-User-SSH | Test if authorized_keys exists"
  become: yes
  ansible.builtin.stat:
    path: /root/.ssh/authorized_keys
  register: root_ssh_key

- name: "Init-User-SSH | Create .ssh folder"
  become: yes
  ansible.builtin.file:
    path: "/home/{{ hostvars[inventory_hostname]['ansible_user'] }}/.ssh"
    state: directory
    owner: "{{ hostvars[inventory_hostname]['ansible_user'] }}"
    group: "{{ hostvars[inventory_hostname]['ansible_user'] }}"
    mode: '0700'
  when: root_ssh_key.stat.exists

- name: "Init-User-SSH | Copy authorized_keys from root"
  become: yes
  ansible.builtin.copy:
    src: /root/.ssh/authorized_keys
    dest: "/home/{{ hostvars[inventory_hostname]['ansible_user'] }}/.ssh/authorized_keys"
    remote_src: yes
    owner: "{{ hostvars[inventory_hostname]['ansible_user'] }}"
    group: "{{ hostvars[inventory_hostname]['ansible_user'] }}"
    mode: '0600'
  when: root_ssh_key.stat.exists

# 3. FIREWALLD (Install and configure for SSH access)
- name: "Init-User-SSH | Install firewalld"
  ansible.builtin.dnf:
    name: firewalld
    state: present
  register: firewalld_change

- name: "Init-User-SSH | Ensure firewalld service is unmasked and enabled"
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: yes
    masked: no
  register: firewalld_change

- name: "Init-User-SSH | Ensure custom SSH port is allowed in {{ firewalld_default_zone }} zone"
  ansible.builtin.firewalld:
    zone: "{{ firewalld_default_zone }}"
    port: "{{ hostvars[inventory_hostname]['ansible_port'] }}/tcp"
    permanent: yes
    state: enabled
    immediate: yes

- name: "Init-User-SSH | Set default zone to {{ firewalld_default_zone }}"
  ansible.builtin.command: "firewall-cmd --set-default-zone={{ firewalld_default_zone }}"
  register: result
  changed_when: "'success' in result.stdout"
  when: firewalld_change.changed

- name: "Init-User-SSH | Reload firewalld to apply changes"
  ansible.builtin.service:
    name: firewalld
    state: reloaded
  when: firewalld_change.changed

# 4. SSH CONFIGURATION (Hardening)
- name: "Init-User-SSH | Ensure custom SSH port is set"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port [0-9]+'
    line: "Port {{ hostvars[inventory_hostname]['ansible_port'] }}"
    state: present
  register: ssh_config_change

- name: "Init-User-SSH | Disable password authentication"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?(PasswordAuthentication|PermitEmptyPasswords).*'
    line: 'PasswordAuthentication no'
    state: present
  register: ssh_config_change

- name: "Init-User-SSH | Disable root login"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin.*'
    line: 'PermitRootLogin no'
    state: present
  register: ssh_config_change

- name: "Init-User-SSH | Restart sshd service"
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  when: ssh_config_change.changed
